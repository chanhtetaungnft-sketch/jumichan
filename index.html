<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jumi Chan</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#ffd6e7,#fff0f5);
}

#loginPage{
    position:fixed;
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ffb6d9,#ffe6f0);
    z-index:999;
}

.login-box{
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
    text-align:center;
    width:300px;
}

.login-box h2{
    margin-bottom:20px;
    color:#ff4da6;
}

.login-box input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border-radius:10px;
    border:1px solid #ddd;
}

.login-box button{
    width:100%;
    padding:10px;
    background:#ff66b2;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.error{
    color:red;
    font-size:14px;
}

#mainPage{
    display:none;
}

h1{
    text-align:center;
    padding:30px;
    color:#ff4da6;
}

.roadmap{
    position:relative;
    width:90%;
    margin:auto;
    padding:50px 0;
}

.roadmap::before{
    content:'';
    position:absolute;
    left:50%;
    width:6px;
    height:100%;
    background:#ff99cc;
}

.step{
    width:50%;
    padding:20px;
    position:relative;
}

.left{left:0;}
.right{left:50%;}

.card{
    background:rgba(255,255,255,0.5);
    backdrop-filter:blur(15px);
    padding:20px;
    border-radius:20px;
    box-shadow:0 8px 25px rgba(255,105,180,0.2);
    transition:0.4s;
}

.card:hover{
    transform:scale(1.05);
}

.card img,video{
    width:100%;
    border-radius:15px;
    margin-bottom:10px;
}

.step::after{
    content:'💖';
    position:absolute;
    top:30px;
    right:-15px;
}

.right::after{
    left:-15px;
}

.heart{
    position:fixed;
    bottom:-50px;
    font-size:20px;
    animation:floatUp linear infinite;
}

@keyframes floatUp{
    to{transform:translateY(-120vh);}
}

@media(max-width:768px){
.step{width:100%;left:0;}
.roadmap::before{left:20px;}
.step::after{left:5px;}
}
</style>
</head>

<body>

<div id="loginPage">
    <div class="login-box">
        <h2>Jumi Chan 💖 memory</h2>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()">Login</button>
        <p class="error" id="errorMsg"></p>
    </div>
</div>

<div id="mainPage">

<h1>💖 Jumi Chan 💖</h1>

<div class="roadmap">

<div class="step left">
<div class="card">
<img src="images/Hello World1.jpg">
<p>Welcome to the World 🌍</p>
</div>
</div>

<div class="step right">
<div class="card">
<img src="images/Hello World2.jpg">
<p>Hello Baby</p>
</div>
</div>

<div class="step left">
<div class="card">
<img src="images/Hello World3.jpg">
<p>Hello Baby</p>
</div>
</div>

<div class="step right">
<div class="card">
<img src="images/Hello World4.jpg">
<p>Sleeping Like an Angel 😇</p>
</div>
</div>

<div class="step left">
<div class="card">
<img src="images/Hello World5.jpg">
<p>Sleeping Like an Angel 😇</p>
</div>
</div>

<div class="step right">
<div class="card">
<img src="images/Safe with Mommy.jpg">
<p>Safe with Mommy 🤱</p>
</div>
</div>

<div class="step left">
<div class="card">
<img src="images/Laughing All Day.jpg">
<p>Little Laughs, Big Joy 💖</p>
</div>
</div>

<div class="step right">
<div class="card">
<img src="images/In Daddy’s Arms.jpg">
<p>In Daddy’s Arms 🤍</p>
</div>
</div>

<div class="step left">
<div class="card">
<img src="images/Family Time4.jpg">
<p>Our Little Sunshine ☀️</p>
</div>
</div>

<div class="step right">
<div class="card">
<video controls>
<source src="video/memories.mp4" type="video/mp4">
</video>
<p>Unforgettable moment 💖</p>
</div>
</div>

</div>
</div>

<script>
function login(){
    const user = document.getElementById("username").value;
    const pass = document.getElementById("password").value;

    const correctUser = "moechanyamone";
    const correctPass = "18072024";

    if(user === correctUser && pass === correctPass){
        document.getElementById("loginPage").style.display = "none";
        document.getElementById("mainPage").style.display = "block";
    }else{
        document.getElementById("errorMsg").innerText = "Wrong Username or Password!";
    }
}

setInterval(()=>{
 let h=document.createElement("div");
 h.className="heart";
 h.innerHTML="💖";
 h.style.left=Math.random()*100+"vw";
 h.style.animationDuration=(4+Math.random()*4)+"s";
 document.body.appendChild(h);
 setTimeout(()=>h.remove(),8000);
},400);
</script>

</body>
</html>
