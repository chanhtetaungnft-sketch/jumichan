<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Life Roadmap</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#ffd6e7,#fff0f5);
    transition:0.5s;
    overflow-x:hidden;
}

.dark{
    background:linear-gradient(135deg,#1a1a2e,#16213e);
    color:white;
}

h1{
    text-align:center;
    padding:20px;
    color:#ff4da6;
}

/* Controls */
.controls{
    text-align:center;
    margin-bottom:20px;
}

button{
    padding:8px 15px;
    margin:5px;
    border:none;
    border-radius:20px;
    background:#ff66b2;
    color:white;
    cursor:pointer;
}

/* SVG ROAD */
.road{
    position:relative;
    width:100%;
    height:1500px;
}

svg{
    position:absolute;
    width:100%;
    height:100%;
}

/* Steps */
.step{
    position:absolute;
    width:250px;
    transform:translate(-50%,-50%);
    opacity:0;
    transition:0.6s;
}

.step.show{
    opacity:1;
}

.card{
    background:rgba(255,255,255,0.5);
    backdrop-filter:blur(15px);
    padding:15px;
    border-radius:15px;
    box-shadow:0 8px 25px rgba(255,105,180,0.2);
    transition:0.4s;
}

.card.active{
    box-shadow:0 0 25px #ff4da6;
    transform:scale(1.05);
}

.card img,video{
    width:100%;
    border-radius:10px;
    margin-bottom:10px;
}

/* Positions */
#s1{top:100px;left:30%;}
#s2{top:350px;left:70%;}
#s3{top:650px;left:30%;}
#s4{top:950px;left:70%;}

/* Responsive */
@media(max-width:768px){
.step{left:50% !important;}
}
</style>
</head>

<body>

<h1>💖 My Life Roadmap 💖</h1>

<div class="controls">
<button onclick="toggleMusic()">🎵 Music</button>
<button onclick="autoSlide()">🎬 Auto Slide</button>
<button onclick="toggleDark()">🌙 Mode</button>
</div>

<audio id="music" loop>
<source src="https://www.bensound.com/bensound-music/bensound-slowmotion.mp3">
</audio>

<div class="road">

<!-- SVG Path -->
<svg viewBox="0 0 500 1500">
<path d="M250 0 C100 200,400 400,250 600 S100 1000,250 1400"
stroke="#ff99cc" stroke-width="8" fill="none"/>
</svg>

<!-- Steps -->
<div class="step" id="s1">
<div class="card">
<img src="images/Laughing Baby.jpg">
<h2>👶 Launghing Baby</h2>
<p>My happy childhood memories 💗</p>
</div>
</div>

<div class="step" id="s2">
<div class="card">
<img src="images/Hello World.jpg">
<h2> Myanmar Plaza </h2>
<p>Learning baby 🎀</p>
</div>
</div>

<div class="step" id="s3">
<div class="card">
<img src="images/Shopping Time.jpg">
<h2> Shopping Time</h2>
</div>
</div>

<div class="step" id="s3">
<div class="card">
<img src="images/Family Time.jpg">
<h2> Family Time</h2>
</div>
</div>

<div class="step" id="s4">
<div class="card">
<video controls>
<source src="video/memories.mp4" type="video/mp4">
</video>
<h2>🎥 Special Memory</h2>
</div>
</div>

</div>

<script>
// Reveal + Active
let steps=document.querySelectorAll(".step");

window.addEventListener("scroll",()=>{
steps.forEach(s=>{
let top=s.getBoundingClientRect().top;
if(top<window.innerHeight-100){
s.classList.add("show");
}
if(top<window.innerHeight/2 && top>0){
document.querySelectorAll(".card").forEach(c=>c.classList.remove("active"));
s.querySelector(".card").classList.add("active");
}
});
});

// Music
let music=document.getElementById("music"),play=false;
function toggleMusic(){ play?music.pause():music.play(); play=!play; }

// Dark mode
function toggleDark(){ document.body.classList.toggle("dark"); }

// Auto Slide
function autoSlide(){
let y=0;
let interval=setInterval(()=>{
window.scrollBy(0,2);
y+=2;
if(y>1500) clearInterval(interval);
},10);
}
</script>

</body>
</html>
